services:
  db:
    image: postgres:16-alpine
    container_name: quicksketch-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: quicksketch
      POSTGRES_PASSWORD: quicksketch
      POSTGRES_DB: quicksketch
    volumes:
      - quicksketch-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quicksketch -d quicksketch"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: quicksketch-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://quicksketch:quicksketch@db:5432/quicksketch?schema=public"
      JWT_SECRET: "change-me-with-a-long-random-string"
      JWT_EXPIRES_IN: "1d"
      PORT: 3000
      CORS_ORIGIN: "http://localhost:4200"
      DRAW_TIME_LIMIT_SECONDS: 60
      DRAW_TIME_GRACE_SECONDS: 5
      MAX_GUESSES: 10
      MAX_IMAGE_BYTES: 1500000
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    container_name: quicksketch-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  quicksketch-data:
